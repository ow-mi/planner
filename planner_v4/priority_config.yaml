# ============================================================================
# PRIORITY CONFIGURATION FILE - Test Planner V4
# ============================================================================
# 
# This file controls how the Test Planner schedules tests and prioritizes
# different project legs. You can edit this file to change scheduling behavior.
#
# FILE FORMAT: YAML (YAML Ain't Markup Language)
# - Use spaces for indentation (NOT tabs)
# - Comments start with # (like this line)
# - Text after # is ignored by the planner
# - Be careful with indentation - it matters!
#
# YAML vs JSON:
# - The planner supports both YAML (.yaml) and JSON (.json) formats
# - YAML is easier to read and edit for non-technical users
# - If both priority_config.yaml and priority_config.json exist, YAML takes priority
# - To use YAML, ensure PyYAML is installed: pip install pyyaml
#
# ============================================================================
# QUICK START GUIDE
# ============================================================================
#
# To edit this file:
# 1. Open in any text editor (Notepad, VS Code, etc.)
# 2. Find the section you want to change
# 3. Edit the values (keep the same format)
# 4. Save the file
# 5. Run the planner again
#
# IMPORTANT: After editing, make sure:
# - Dates are in YYYY-MM-DD format (e.g., "2027-05-01")
# - Numbers don't have quotes around them (unless they're text)
# - Indentation is consistent (use spaces, not tabs)
# - There are no extra commas or brackets
#
# ============================================================================
# CONFIGURATION MODE
# ============================================================================

# The scheduling mode determines how the planner prioritizes work.
# Available modes:
#   - "leg_end_dates": Each leg has a target completion date (CURRENT MODE)
#   - "leg_priority": Higher priority legs scheduled first
#   - "end_date_priority": Minimize total project duration
#   - "end_date_sticky": Target completion with gap filling
#   - "resource_bottleneck": Balance resource utilization
#
# CURRENT MODE: "leg_end_dates"
# This mode allows legs to run in parallel as long as they meet their deadlines.
# Each leg below has a target completion date that the planner will try to meet.
mode: leg_end_dates

# Human-readable description of what this configuration does.
# This is just for documentation - it doesn't affect the planner.
description: Each leg has a target completion date. Legs can be scheduled in parallel if they don't exceed their deadlines.

# ============================================================================
# OBJECTIVE FUNCTION WEIGHTS
# ============================================================================
#
# These weights control the balance between two optimization goals:
# 1. Minimizing total project duration (makespan)
# 2. Meeting priority/deadline requirements
#
# IMPORTANT: These two weights MUST add up to 1.0 (100%)
# Example: 0.2 + 0.8 = 1.0 ✓ (correct)
# Example: 0.3 + 0.9 = 1.2 ✗ (wrong - will cause errors)
#
# Higher makespan_weight = Planner focuses on finishing everything quickly
# Higher priority_weight = Planner focuses on meeting deadlines/priorities
#
# Current settings:
#   - 20% weight on minimizing total duration
#   - 80% weight on meeting deadlines
# This means the planner prioritizes meeting deadlines over speed.

weights:
  # Weight for minimizing total project duration (makespan)
  # Range: 0.0 to 1.0
  # Lower values = Less emphasis on speed
  # Higher values = More emphasis on finishing quickly
  # Current: 0.2 (20% emphasis on speed)
  makespan_weight: 0.2

  # Weight for meeting priority/deadline requirements
  # Range: 0.0 to 1.0
  # Lower values = Less emphasis on deadlines
  # Higher values = More emphasis on meeting deadlines
  # Current: 0.8 (80% emphasis on deadlines)
  priority_weight: 0.8

# ============================================================================
# LEG DEADLINES
# ============================================================================
#
# Each project leg has a target completion date (deadline).
# The planner will try to schedule tests so each leg finishes by its deadline.
#
# HOW TO EDIT:
# 1. Find the leg you want to change (look for the leg ID from data_legs.csv)
# 2. Change the date to your new deadline
# 3. Date format: YYYY-MM-DD (Year-Month-Day)
#    Example: "2027-05-01" = May 1st, 2027
#
# WHAT HAPPENS IF A DEADLINE IS MISSED:
# - The planner will still create a schedule
# - A penalty is applied for each day past the deadline
# - The penalty amount is set by "deadline_penalty_per_day" below
# - Higher penalties = Planner tries harder to meet deadlines
#
# LEG ID FORMAT:
# - Format: "project_id_leg_number" (e.g., "mwcu_b10_6")
# - These IDs come from the "project_leg_id" column in data_legs.csv
# - Make sure the IDs match exactly (case-sensitive, including dots/underscores)
#
# EXAMPLE:
#   mwcu_b10_6: "2027-05-01"  ← Leg "mwcu_b10_6" must finish by May 1, 2027
#   mwcu_a7_6:  "2027-05-01"  ← Leg "mwcu_a7_6" must finish by May 1, 2027

leg_deadlines:
  # MWCU B10 Project - Leg 6
  # Deadline: May 1st, 2027
  mwcu_b10_6: "2027-05-01"

  # MWCU A7 Project - Leg 6
  # Deadline: May 1st, 2027
  mwcu_a7_6: "2027-05-01"

  # MWCU B10 Project - Leg 2.1
  # Deadline: December 15th, 2028
  mwcu_b10_2.1: "2028-12-15"

  # MWCU A7 Project - Leg 2.1
  # Deadline: December 15th, 2028
  mwcu_a7_2.1: "2028-12-15"

  # MWCU B10 Project - Leg 2.2
  # Deadline: July 1st, 2028
  mwcu_b10_2.2: "2028-07-01"

  # MWCU A7 Project - Leg 2.2
  # Deadline: July 1st, 2028
  mwcu_a7_2.2: "2028-07-01"

  # MWCU B10 Project - Leg 3
  # Deadline: June 1st, 2028
  mwcu_b10_3: "2028-06-01"

  # MWCU A7 Project - Leg 3
  # Deadline: June 1st, 2028
  mwcu_a7_3: "2028-06-01"

  # MWCU B10 Project - Leg 4
  # Deadline: July 1st, 2027
  mwcu_b10_4: "2027-07-01"

  # MWCU A7 Project - Leg 4
  # Deadline: July 1st, 2027
  mwcu_a7_4: "2027-07-01"

  # MWCU B10 Project - Leg 5
  # Deadline: July 1st, 2027
  mwcu_b10_5: "2027-07-01"

  # MWCU A7 Project - Leg 5
  # Deadline: July 1st, 2027
  mwcu_a7_5: "2027-07-01"

  # MWCU B10 Project - Leg 5a
  # Deadline: July 1st, 2027
  mwcu_b10_5a: "2027-07-01"

  # MWCU A7 Project - Leg 5a
  # Deadline: July 1st, 2027
  mwcu_a7_5a: "2027-07-01"

  # MWCU B10 Project - Leg 5b
  # Deadline: July 1st, 2027
  mwcu_b10_5b: "2027-07-01"

  # MWCU A7 Project - Leg 5b
  # Deadline: July 1st, 2027
  mwcu_a7_5b: "2027-07-01"

  # MWCU B10 Project - Leg 7
  # Deadline: December 15th, 2028
  mwcu_b10_7: "2028-12-15"

  # MWCU A7 Project - Leg 7
  # Deadline: December 15th, 2028
  mwcu_a7_7: "2028-12-15"

# ============================================================================
# DEADLINE PENALTY SETTINGS
# ============================================================================

# Penalty cost per day when a leg finishes after its deadline.
# This is a "soft constraint" - deadlines can be missed, but with a cost.
#
# HOW IT WORKS:
# - If a leg finishes 5 days late, penalty = 5 × deadline_penalty_per_day
# - Higher penalty = Planner tries harder to meet deadlines
# - Lower penalty = Planner is more flexible about deadlines
#
# TYPICAL VALUES:
# - 100-500: Low penalty (flexible deadlines)
# - 500-1000: Medium penalty (moderate deadline importance)
# - 1000-5000: High penalty (strict deadlines)
# - 5000+: Very high penalty (deadlines are critical)
#
# CURRENT VALUE: 1000.0
# This means each day past deadline costs 1000 penalty points.
# The planner will try to minimize total penalties.

deadline_penalty_per_day: 1000.0

# ============================================================================
# LEG COMPACTNESS SETTINGS
# ============================================================================
#
# Penalty cost per day of leg duration (leg end - leg start).
# This encourages tests within a leg to be scheduled as tightly as possible,
# reducing idle gaps when resources are available.
#
# HOW IT WORKS:
# - For each leg: penalty = (leg_completion - leg_start) × leg_compactness_penalty_per_day
# - Higher penalty = tighter, more contiguous legs
# - Set to 0 to disable compactness pressure
#
# TYPICAL VALUES:
# - 0: No compactness objective (default behavior)
# - 50-200: Light pressure to reduce gaps
# - 200-1000: Strong pressure to keep legs compact
#
# CURRENT VALUE: 0.0 (disabled)

leg_compactness_penalty_per_day: 0.0

# Whether legs can run in parallel (at the same time) if they don't exceed deadlines.
# This is a key feature of "leg_end_dates" mode.
#
# TRUE (recommended):
#   - Legs can run simultaneously if resources allow
#   - More efficient use of resources
#   - Faster overall project completion
#   - Example: Leg A and Leg B can both run in week 10 if they both meet deadlines
#
# FALSE:
#   - Legs must run sequentially (one after another)
#   - Less efficient but more predictable
#   - Use this if you need strict sequencing
#
# CURRENT VALUE: true
# Legs can run in parallel as long as they meet their deadlines.

allow_parallel_within_deadlines: true

# ============================================================================
# TEST PROXIMITY RULES
# ============================================================================
#
# These rules ensure that certain tests run close together in time.
# This is useful when tests need to be performed in quick succession
# (e.g., for quality control, calibration, or sequential measurements).
#
# HOW IT WORKS:
# - Tests matching the patterns must start within "max_gap_days" of the previous test
# - If a test starts too late, a penalty is applied
# - This works WITHIN each leg's sequence (tests in order)
#
# EXAMPLE:
#   If pattern "P-02" matches test names, and max_gap_days = 10:
#   - Test 1 runs on Day 1
#   - Test 2 (contains "P-02") must start by Day 11 (within 10 days)
#   - If Test 2 starts on Day 15, penalty = 4 days × proximity_penalty_per_day

test_proximity_rules:
  # List of text patterns to match in test names, IDs, or descriptions.
  # Tests containing these strings will be subject to proximity constraints.
  #
  # PATTERN MATCHING:
  # - Patterns are case-sensitive by default
  # - Partial matches work (e.g., "P-02" matches "TEST_P-02_MAIN")
  # - Multiple patterns can be specified
  #
  # EXAMPLES:
  #   patterns: ["P-02", "P-03"]           ← Matches tests with "P-02" or "P-03"
  #   patterns: ["calibration"]            ← Matches tests with "calibration"
  #   patterns: ["P-02", "P-03", "P-04"]  ← Matches any of these patterns
  #
  # CURRENT PATTERNS:
  #   - "P-02": Pressure test type 2
  #   - "P-03": Pressure test type 3
  #   - "P-04": Pressure test type 4
  #   - "P-03-E": Pressure test type 3 Extended
  #   - "P-02-L": Pressure test type 2 Long
  #   - "Leak": Leak testing
  #
  # TO ADD A PATTERN:
  #   - Add a new line with "- " followed by the pattern in quotes
  #   - Example: - "P-05"  (adds pattern for P-05 tests)
  #
  # TO REMOVE A PATTERN:
  #   - Delete the line with that pattern
  #   - Or comment it out with # at the start
  patterns:
    - P-02      # Pressure test type 2
    - P-03      # Pressure test type 3
    - P-04      # Pressure test type 4
    - P-03-E    # Pressure test type 3 Extended
    - P-02-L    # Pressure test type 2 Long
    - Leak      # Leak testing

  # Maximum allowed gap (in days) between a pattern-matched test and the previous test.
  # If a test starts more than this many days after the previous test, a penalty applies.
  #
  # HOW TO CHOOSE A VALUE:
  # - Small values (1-5 days): Tests must run very close together
  # - Medium values (5-15 days): Tests should run within a week or two
  # - Large values (15-30+ days): Tests can have more spacing
  #
  # CONSIDERATIONS:
  # - Shorter gaps = More constraints = Harder to schedule
  # - Longer gaps = Fewer constraints = Easier to schedule
  # - Consider your resource availability and test durations
  #
  # CURRENT VALUE: 10 days
  # Pattern-matched tests must start within 10 days of the previous test.
  max_gap_days: 10

  # Penalty cost per day when a pattern-matched test starts too late.
  # This penalty applies for each day beyond "max_gap_days".
  #
  # EXAMPLE:
  #   max_gap_days = 10
  #   Test starts 15 days after previous test
  #   Days over limit = 15 - 10 = 5 days
  #   Total penalty = 5 × proximity_penalty_per_day
  #
  # RELATIVE TO DEADLINE PENALTY:
  # - This penalty is typically lower than deadline_penalty_per_day
  # - Proximity is a "nice to have" constraint
  # - Deadlines are more critical
  #
  # TYPICAL VALUES:
  # - 10-50: Low penalty (proximity is optional)
  # - 50-200: Medium penalty (proximity is important)
  # - 200-500: High penalty (proximity is critical)
  #
  # CURRENT VALUE: 50.0
  # Each day over the gap limit costs 50 penalty points.
  proximity_penalty_per_day: 50.0

  # Whether to enforce proximity within the leg's sequence order.
  # This ensures tests follow the sequence_index order from data_test.csv.
  #
  # TRUE (recommended):
  #   - Proximity is checked between consecutive tests in the leg sequence
  #   - Test 2 must be close to Test 1, Test 3 close to Test 2, etc.
  #   - This respects the natural test order
  #
  # FALSE:
  #   - Proximity is checked globally (not recommended)
  #   - May cause unexpected behavior
  #
  # CURRENT VALUE: true
  # Proximity is enforced within each leg's test sequence.
  enforce_sequence_order: true

# ============================================================================

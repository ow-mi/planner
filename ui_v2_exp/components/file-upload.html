<div x-data="fileUploadComponent()" x-init="init()">
    <!-- File Upload Section -->
    <div class="section">
        <div
            class="drop-zone"
            @dragover.prevent="dragOver = true"
            @dragleave.prevent="dragOver = false"
            @drop.prevent="handleFileDrop($event)"
            @click="$refs.fileInput.click()"
            :class="{ 'drag-over': dragOver }"
        >
            <p>Drag & drop CSV files here, or click to select files.</p>
            <input type="file" multiple @change="handleFileUpload($event)" x-ref="fileInput" class="hidden" accept=".csv">
        </div>

        <!-- File List -->
        <div x-show="uploadedFiles.length > 0">
            <h3>Uploaded Files</h3>
            <ul class="file-list">
                <template x-for="file in uploadedFiles" :key="file.name">
                    <li>
                        <span x-text="file.name"></span>
                        <span x-text="helpers.formatFileSize(file.size)" style="margin-left: 10px; color: var(--text-light); font-size: 0.8rem;"></span>
                        <button @click="removeFile(file.name)" class="btn btn-danger" style="margin-left: 10px; padding: 0.25rem 0.5rem; font-size: 0.8rem;">Remove</button>
                    </li>
                </template>
            </ul>

            <div class="form-group" style="margin-top: 1rem;">
                <button @click="clearAllFiles()" class="btn btn-danger" :disabled="uploadedFiles.length === 0">Clear All Files</button>
            </div>
        </div>

        <!-- Error Display -->
        <div x-show="error" class="validation-error" style="margin-top: 1rem;">
            <span x-text="error"></span>
        </div>
    </div>
</div>

<script>
function fileUploadComponent() {
    return {
        dragOver: false,

        init() {
            console.log('File upload component initialized');
        },

        handleFileUpload(event) {
            this.$store.files.handleFileUpload(event);
        },

        handleFileDrop(event) {
            this.$store.files.handleFileDrop(event);
        },

        removeFile(filename) {
            this.$store.files.removeFile(filename);
        },

        clearAllFiles() {
            if (confirm('Are you sure you want to remove all uploaded files?')) {
                this.$store.files.clearAllFiles();
            }
        }
    };
}
</script>

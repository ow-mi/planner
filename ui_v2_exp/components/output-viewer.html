<div x-data="outputViewerComponent()" x-init="init()">
    <!-- Output Data Section -->
    <div class="section">
        <div x-show="!hasResults">
            <p>No results available. Run the solver first.</p>
        </div>

        <template x-if="hasResults">
            <div>
                <!-- Summary Section -->
                <div class="section">
                    <h3>Summary</h3>
                    <p>Status: <span x-text="results?.status || 'Unknown'"></span></p>
                    <template x-if="results?.makespan">
                        <p>Makespan: <span x-text="results?.makespan"></span> days</p>
                    </template>
                    <template x-if="results?.solver_stats">
                        <div>
                            <p>Solve Time: <span x-text="results.solver_stats.solve_time?.toFixed(2) || 'N/A'"></span>s</p>
                            <p>Objective Value: <span x-text="results.solver_stats.objective_value || 'N/A'"></span></p>
                        </div>
                    </template>
                </div>

                <!-- Output Files Section -->
                <div class="section">
                    <h3>Output Files</h3>
                    <div class="form-group">
                        <button @click="downloadAllResults()" class="btn">Download All Results (ZIP)</button>
                    </div>
                    <div style="overflow-x: auto;">
                        <table style="margin-top: 1rem;">
                            <thead>
                                <tr>
                                    <th>Filename</th>
                                    <th>Size</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="(content, filename) in results?.output_files" :key="filename">
                                    <tr>
                                        <td x-text="filename"></td>
                                        <td x-text="helpers.formatFileSize(content.length)"></td>
                                        <td>
                                            <button @click="downloadSingleFile(filename, content)" class="btn" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;">Download</button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Results Preview Section -->
                <div class="section">
                    <h3>Results Preview</h3>
                    <div style="max-height: 400px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 4px; padding: 1rem; background-color: #f8f9fa;">
                        <pre style="margin: 0; font-size: 0.8rem; white-space: pre-wrap;" x-text="JSON.stringify(results, null, 2)"></pre>
                    </div>
                </div>
            </div>
        </template>
    </div>
</div>

<script>
function outputViewerComponent() {
    return {
        init() {
            console.log('Output viewer component initialized');
        },

        // Access store properties
        get results() {
            return this.$store.solver.getResults();
        },

        get hasResults() {
            return this.$store.solver.hasResults();
        },

        downloadSingleFile(filename, content) {
            this.$store.solver.downloadSingleFile(filename, content);
        },

        async downloadAllResults() {
            try {
                await this.$store.solver.downloadAllResults();
            } catch (error) {
                alert('Failed to download all results: ' + error.message);
            }
        }
    };
}
</script>

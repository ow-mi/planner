<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priority Configuration Editor v2</title>

    <!-- Import Maps for ES Modules -->
    <script type="importmap">
    {
        "imports": {
            "@codemirror/view": "./node_modules/@codemirror/view/dist/index.js",
            "@codemirror/state": "./node_modules/@codemirror/state/dist/index.js",
            "@codemirror/language": "./node_modules/@codemirror/language/dist/index.js",
            "@codemirror/commands": "./node_modules/@codemirror/commands/dist/index.js",
            "@codemirror/search": "./node_modules/@codemirror/search/dist/index.js",
            "@codemirror/autocomplete": "./node_modules/@codemirror/autocomplete/dist/index.js",
            "@codemirror/lint": "./node_modules/@codemirror/lint/dist/index.js",
            "@codemirror/lang-javascript": "./node_modules/@codemirror/lang-javascript/dist/index.js",
            "@codemirror/theme-one-dark": "./node_modules/@codemirror/theme-one-dark/dist/index.js",
            "@lezer/common": "./node_modules/@lezer/common/dist/index.js",
            "@lezer/highlight": "./node_modules/@lezer/highlight/dist/index.js",
            "@lezer/lr": "./node_modules/@lezer/lr/dist/index.js",
            "@lezer/javascript": "./node_modules/@lezer/javascript/dist/index.js",
            "@marijn/find-cluster-break": "./node_modules/@marijn/find-cluster-break/src/index.js",
            "style-mod": "./node_modules/style-mod/src/style-mod.js",
            "w3c-keyname": "./node_modules/w3c-keyname/index.js",
            "crelt": "./node_modules/crelt/index.js"
        }
    }
    </script>

     <!-- HTMX - Upgraded to 2.x for improved fragment loading and Alpine.js integration -->
     <script src="./deps/htmx.min.js"></script>
     <script type="module" src="src/js/core/htmx-config.js"></script>

     <!-- Component definitions - MUST be loaded BEFORE Alpine.js initializes -->
     <script src="src/js/components/configEditorComponent.js"></script>
     <script src="src/js/stores/themeStore.js"></script>
     <script src="src/js/components/themeToggleComponent.js"></script>

      <!-- Main application logic -->
      <script type="module" src="src/js/core/app.js"></script>

      <!-- Alpine.js -->
      <script src="./deps/alpinejs.min.js" defer></script>

     <!-- External Libraries -->
    <script src="./deps/jszip.min.js"></script>
    <script src="./deps/d3.v7.min.js"></script>
    <script src="./deps/papaparse.min.js"></script>

    <!-- CSS -->
    <link rel="icon" href="favicon.ico" sizes="any">
    <!-- Tailwind CSS (required for DaisyUI) -->
    <script src="./deps/tailwindcss.js"></script>
    <!-- DaisyUI Theme CSS (includes styles and JS plugin when used via CDN) -->
    <link href="./deps/daisyui.css" rel="stylesheet" type="text/css" />
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {},
            },
            daisyui: {
                themes: true,
                darkTheme: "dark",
                base: true,
                styled: true,
                utils: true,
            },
        };
    </script>
     <link rel="stylesheet" href="src/styles/base.css">
     <link rel="stylesheet" href="src/styles/theme-toggle.css">
     <link rel="stylesheet" href="src/styles/utilities.css">
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <h1 style="margin: 0;">Priority Configuration Editor v2</h1>
            <!-- Global theme selector - visible on all pages -->
            <div id="theme-selector-container" hx-get="src/components/theme-selector.html" hx-trigger="load" hx-swap="innerHTML"></div>
        </div>
        <div class="app-content">
            <!-- Main application container -->
            <div x-data="app()" x-init="initApp()" x-cloak>
         <!-- Tabs container - loaded via HTMX -->
         <div id="tabs-container" data-loaded="false"></div>
         
         <!-- Tab content containers -->
         <div id="file-upload-container" class="tab-content" data-loaded="false"></div>
         <div id="data-editor-container" class="tab-content" data-loaded="false"></div>
         <div id="config-editor-container" class="tab-content" data-loaded="false"></div>
         <div id="solver-controls-container" class="tab-content" data-loaded="false"></div>
         <div id="batch-editor-container" class="tab-content" data-loaded="false"></div>
         <div id="visualizer-container" class="tab-content" data-loaded="false"></div>
         <div id="output-viewer-container" class="tab-content" data-loaded="false"></div>
            </div>
        </div>
    </div>

     <!-- Load editor setup (CodeMirror) -->
     <script type="module" src="src/js/editor-setup.js"></script>

       <!-- Load Alpine.js stores -->
       <script src="src/js/stores/fileStore.js"></script>
       <script src="src/js/stores/configStore.js"></script>
       <script src="src/js/stores/solverStore.js"></script>
       <script src="src/js/stores/batchStore.js"></script>
       <script src="src/js/stores/visualizationStore.js"></script>

       <!-- Load legacy templates (d3-based visualizations) -->
       <script src="src/js/legacy-templates.js"></script>

    <!-- Load services -->
    <script src="src/js/services/apiService.js"></script>
    <script src="src/js/services/notificationService.js"></script>

    <!-- Load utilities -->
    <script src="src/js/utils/helpers.js"></script>
    <script src="src/js/utils/validation.js"></script>

    <!-- Load tab loader (must be before app initialization) -->
    <script src="src/js/core/tabLoader.js"></script>

</body>
</html>

<div x-data="solverTabComponent()" x-cloak>
    <!-- Subtab Navigation Sidebar -->
    <div class="subtab-container">
        <div class="subtab-sidebar">
            <button
                type="button"
                class="subtab-btn"
                :class="{ 'active': activeSubtab === 'solver' }"
                @click="setActiveSubtab('solver')"
                @keydown.enter.prevent="setActiveSubtab('solver')"
                @keydown.space.prevent="setActiveSubtab('solver')"
            >
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                Solver
            </button>
            <button
                type="button"
                class="subtab-btn"
                :class="{ 'active': activeSubtab === 'batch' }"
                @click="setActiveSubtab('batch')"
                @keydown.enter.prevent="setActiveSubtab('batch')"
                @keydown.space.prevent="setActiveSubtab('batch')"
            >
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="3" y1="9" x2="21" y2="9"></line>
                    <line x1="9" y1="21" x2="9" y2="9"></line>
                </svg>
                Batch
            </button>
        </div>
        
        <div class="subtab-content">
            <!-- Solver Section -->
            <div x-show="activeSubtab === 'solver'" class="config-section" id="section-solver">
                <div class="section-header">
                    <h3>Run Solver</h3>
                    <p>Execute the solver using loaded input data and configuration.</p>
                </div>
                <!-- Solver controls fragment - loads automatically -->
                <div id="solver-controls-fragment" hx-get="src/components/solver-controls.html" hx-trigger="load" hx-swap="innerHTML"></div>
            </div>
            
            <!-- Batch Section -->
            <div x-show="activeSubtab === 'batch'" class="config-section" id="section-batch">
                <div class="section-header">
                    <h3>Batch Execution</h3>
                    <p>Run multiple solver scenarios in batch mode.</p>
                </div>
                <!-- Batch editor fragment - loads automatically -->
                <div id="batch-editor-fragment" hx-get="src/components/batch-editor.html" hx-trigger="load" hx-swap="innerHTML"></div>
            </div>
        </div>
    </div>
</div>

<script>
/**
 * Solver Tab Component
 * Manages subtab navigation between Solver and Batch views
 * 
 * Alpine.js Patterns Used:
 * - x-data with function returning object (auto-detects init() method)
 * - Properties reactive to all children (even nested x-data)
 * - Methods callable without parentheses: @click="setActiveSubtab"
 */
function solverTabComponent() {
    return {
        // State
        activeSubtab: 'solver',
        
        /**
         * Automatically called by Alpine.js on initialization
         * Called before x-init directives, if any
         */
        init() {
            console.log('[solver-tab] Component initialized, activeSubtab:', this.activeSubtab);
        },
        
        /**
         * Switch active subtab with validation
         * Alpine.js automatically binds 'this' to the component
         * 
         * @param {string} subtabName - 'solver' or 'batch'
         */
        setActiveSubtab(subtabName) {
            const validSubtabs = ['solver', 'batch'];
            
            if (!validSubtabs.includes(subtabName)) {
                console.warn('[solver-tab] Invalid subtab:', subtabName);
                return;
            }
            
            this.activeSubtab = subtabName;
            console.log('[solver-tab] Switched to:', subtabName);
        }
    };
}
</script>

<!-- Test Configuration Section - Hierarchical Redesign -->
<div x-show="activeSubtab === 'test'" class="config-section" id="section-test">
    <div class="section-header">
        <h3>Test Configuration</h3>
        <p style="margin: 0; font-size: 0.875rem; color: var(--text-light);">Configure test settings across hierarchy levels. More specific levels override more general ones.</p>
    </div>

    <div class="test-container" x-data="{
        activeHierarchyLevel: 'all',
        selectedConfigIds: {
            projects: '',
            legTypes: '',
            legs: '',
            testTypes: '',
            tests: ''
        },
        fieldOrder: ['fteResources', 'fteTimePercentage', 'equipmentResources', 'equipmentTimePercentage', 'isExternal', 'forceStartWeek'],
        getVisibleFields(level) {
            const editable = $store.config.getEditableFields(level) || [];
            return this.fieldOrder.filter(field => editable.includes(field));
        },
        requiresSelection(level) {
            return level !== 'all' && level !== 'csv';
        },
        isCsvLevel(level) {
            return level === 'csv';
        },
        getSelectedId(level) {
            return this.selectedConfigIds[level] || '';
        },
        getLevelOptions(level) {
            return $store.config.getSortedHierarchyOptions(level);
        },
        getLevelTitle(level) {
            const titleMap = {
                all: 'Global Default Settings',
                projects: 'Project Override',
                legTypes: 'Leg Type Override',
                legs: 'Leg Override',
                testTypes: 'Test Type Override',
                tests: 'Test Override',
                csv: 'Resolved CSV Output'
            };
            return titleMap[level] || 'Configuration';
        },
        getLevelIcon(level) {
            const iconMap = {
                all: '🌍',
                projects: '📁',
                legTypes: '🔗',
                legs: '📍',
                testTypes: '🏷️',
                tests: '📝',
                csv: '📊'
            };
            return iconMap[level] || '⚙️';
        },
        getLevelColorKey(level) {
            if (level === 'csv') return '';
            return $store.config.getOriginKeyForConfigLevel(level);
        },
        getLevelButtonStyle(level) {
            const isActive = this.activeHierarchyLevel === level;
            const colorKey = this.getLevelColorKey(level);
            const background = colorKey ? $store.config.getInheritanceBackground(colorKey) : 'var(--bg-secondary)';
            const border = isActive ? 'var(--primary-color)' : 'var(--border-color)';
            const text = isActive ? 'var(--text-strong)' : 'var(--text-color)';
            const weight = isActive ? '600' : '500';
            return `padding: 0.375rem 0.75rem; background: ${background}; color: ${text}; border: 1px solid ${border}; border-radius: 0.25rem; font-size: 0.75rem; font-weight: ${weight}; cursor: pointer;`;
        },
        getSelectionLabel(level) {
            const labelMap = {
                projects: 'Select Project',
                legTypes: 'Select Leg Type',
                legs: 'Select Leg',
                testTypes: 'Select Test Type',
                tests: 'Select Test'
            };
            return labelMap[level] || 'Select Item';
        },
        getSelectionPlaceholder(level) {
            const placeholderMap = {
                projects: 'Choose a project...',
                legTypes: 'Choose a leg type...',
                legs: 'Choose a leg...',
                testTypes: 'Choose a test type...',
                tests: 'Choose a test...'
            };
            return placeholderMap[level] || 'Choose...';
        },
        getSelectedLabel(level) {
            if (level === 'all') return 'Global Defaults';
            return this.getSelectedId(level);
        },
        getFieldLabel(field) {
            const labelMap = {
                fteResources: 'FTE Resources',
                fteTimePercentage: 'FTE Time Percentage',
                equipmentResources: 'Equipment Resources',
                equipmentTimePercentage: 'Equipment Time Percentage',
                isExternal: 'External Test',
                forceStartWeek: 'Force Start Week'
            };
            return labelMap[field] || field;
        },
        getFieldHelp(field) {
            if (field === 'isExternal') return 'Tests run externally without consuming internal resources';
            if (field === 'forceStartWeek') return 'Format: YYYY-Www';
            return '';
        },
        getResolvedField(level, field) {
            const configId = this.getSelectedId(level);
            return $store.config.getResolvedFieldForLevel(level, configId, field);
        },
        getFieldValue(level, field) {
            return this.getResolvedField(level, field)?.value;
        },
        getFieldOrigin(level, field) {
            return this.getResolvedField(level, field)?.originKey || 'all';
        },
        getFieldGroupStyle(level, field) {
            const background = $store.config.getInheritanceBackground(this.getFieldOrigin(level, field));
            return `padding: 0.625rem; border-radius: 0.375rem; background: ${background};`;
        },
        setFieldValue(level, field, value) {
            if (level === 'all') {
                if (!$store.config.testConfig.defaults) {
                    $store.config.testConfig.defaults = {};
                }
                $store.config.testConfig.defaults[field] = value;
                $store.config.updateOutputSettings();
                return;
            }

            const configId = this.getSelectedId(level);
            if (!configId) return;
            $store.config.updateTestConfigValue(level, configId, field, value);
        },
        getResourceOptions(field) {
            const options = field === 'fteResources' ? $store.config.getFteOptions() : $store.config.getEquipmentOptions();
            return Array.isArray(options) ? options : [];
        },
        getResourceValues(level, field) {
            const value = this.getFieldValue(level, field);
            return Array.isArray(value) ? value : [];
        },
        getResourceLabel(field, resourceId) {
            return $store.config.resolveResourceOptionLabel(field, resourceId);
        },
        isResourceSelected(level, field, resourceId) {
            return this.getResourceValues(level, field).includes(resourceId);
        },
        toggleResource(level, field, resourceId) {
            const current = this.getResourceValues(level, field);
            const next = current.includes(resourceId)
                ? current.filter(item => item !== resourceId)
                : [...current, resourceId];
            this.setFieldValue(level, field, next);
        },
        removeResource(level, field, resourceId) {
            const next = this.getResourceValues(level, field).filter(item => item !== resourceId);
            this.setFieldValue(level, field, next);
        }
    }">
        <div class="inheritance-chain" style="margin-bottom: 1.5rem; padding: 1rem; background: var(--bg-secondary); border-radius: 0.5rem;">
            <h4 style="margin: 0 0 0.75rem 0; font-size: 0.875rem; font-weight: 600;">Inheritance Chain</h4>
            <div style="display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;">
                <template x-for="(level, index) in $store.config.getTestHierarchyLevels()" :key="level.id">
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <button
                            type="button"
                            @click="activeHierarchyLevel = level.id"
                            :style="getLevelButtonStyle(level.id)"
                            :title="level.description"
                            x-text="level.label">
                        </button>
                        <span x-show="index < $store.config.getTestHierarchyLevels().length - 1" style="color: var(--text-light);">→</span>
                    </div>
                </template>
            </div>
            <p style="margin: 0.5rem 0 0 0; font-size: 0.75rem; color: var(--text-light);"
               x-text="$store.config.getTestHierarchyLevels().find(level => level.id === activeHierarchyLevel)?.description">
            </p>
        </div>

        <div class="hierarchy-level-content">
            <template x-if="requiresSelection(activeHierarchyLevel)">
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;" x-text="getSelectionLabel(activeHierarchyLevel)"></label>
                    <select x-model="selectedConfigIds[activeHierarchyLevel]" class="form-control" style="width: auto; min-width: 240px;">
                        <option value="" x-text="getSelectionPlaceholder(activeHierarchyLevel)"></option>
                        <template x-for="option in getLevelOptions(activeHierarchyLevel)" :key="option.value">
                            <option :value="option.value" x-text="option.label"></option>
                        </template>
                    </select>
                </div>
            </template>

            <template x-if="isCsvLevel(activeHierarchyLevel)">
                <div class="config-card" style="border: 1px solid var(--border-color); border-radius: 0.5rem; padding: 1rem; background: var(--bg-primary);">
                    <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem;">
                        <span style="font-size: 1.25rem;" x-text="getLevelIcon(activeHierarchyLevel)"></span>
                        <h4 style="margin: 0; font-size: 1rem; font-weight: 600;" x-text="getLevelTitle(activeHierarchyLevel)"></h4>
                    </div>
                    <div style="overflow: auto; border: 1px solid var(--border-color); border-radius: 0.375rem; max-height: 420px;">
                        <table style="margin: 0; width: 100%; border-collapse: collapse; font-size: 0.8rem;">
                            <thead style="position: sticky; top: 0; z-index: 1;">
                                <tr>
                                    <th style="white-space: nowrap;">test_type</th>
                                    <th style="white-space: nowrap;">test_id</th>
                                    <th style="white-space: nowrap;">project</th>
                                    <th style="white-space: nowrap;">leg</th>
                                    <th style="white-space: nowrap;">branch</th>
                                    <th style="white-space: nowrap;">sequence</th>
                                    <th style="white-space: nowrap;">name</th>
                                    <th style="white-space: nowrap;">fte_resources</th>
                                    <th style="white-space: nowrap;">equipment_resources</th>
                                    <th style="white-space: nowrap;">fte_time_percentage</th>
                                    <th style="white-space: nowrap;">equipment_time_percentage</th>
                                    <th style="white-space: nowrap;">is_external</th>
                                    <th style="white-space: nowrap;">force_start_week</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="row in $store.config.getResolvedTestConfigRows()" :key="row.testId">
                                    <tr>
                                        <td x-text="row.testType"></td>
                                        <td x-text="row.testId"></td>
                                        <td x-text="row.project"></td>
                                        <td x-text="row.leg"></td>
                                        <td x-text="row.branch"></td>
                                        <td x-text="row.sequence"></td>
                                        <td x-text="row.name"></td>
                                        <td :style="'background:' + $store.config.getInheritanceBackground(row.origins?.fteResources || 'all')" x-text="(row.fteResourcesDisplay || []).join(';')"></td>
                                        <td :style="'background:' + $store.config.getInheritanceBackground(row.origins?.equipmentResources || 'all')" x-text="(row.equipmentResourcesDisplay || []).join(';')"></td>
                                        <td :style="'background:' + $store.config.getInheritanceBackground(row.origins?.fteTimePercentage || 'all')" x-text="row.fteTimePercentage"></td>
                                        <td :style="'background:' + $store.config.getInheritanceBackground(row.origins?.equipmentTimePercentage || 'all')" x-text="row.equipmentTimePercentage"></td>
                                        <td :style="'background:' + $store.config.getInheritanceBackground(row.origins?.isExternal || 'all')" x-text="row.isExternal ? 'true' : 'false'"></td>
                                        <td :style="'background:' + $store.config.getInheritanceBackground(row.origins?.forceStartWeek || 'all')" x-text="row.forceStartWeek"></td>
                                    </tr>
                                </template>
                                <tr x-show="($store.config.getResolvedTestConfigRows() || []).length === 0">
                                    <td colspan="13" style="text-align: center; color: var(--text-light); padding: 1rem;">No resolved test data available.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </template>

            <template x-if="(!requiresSelection(activeHierarchyLevel) || getSelectedId(activeHierarchyLevel)) && !isCsvLevel(activeHierarchyLevel)">
                <div class="config-card" style="border: 1px solid var(--border-color); border-radius: 0.5rem; padding: 1.5rem; background: var(--bg-primary);">
                    <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem;">
                        <span style="font-size: 1.25rem;" x-text="getLevelIcon(activeHierarchyLevel)"></span>
                        <h4 style="margin: 0; font-size: 1rem; font-weight: 600;" x-text="getLevelTitle(activeHierarchyLevel)"></h4>
                        <span style="font-size: 0.75rem; padding: 0.25rem 0.5rem; background: var(--primary-color-10); color: var(--primary-color); border-radius: 0.25rem;" x-text="getSelectedLabel(activeHierarchyLevel)"></span>
                    </div>

                    <div class="config-fields-grid" style="display: grid; gap: 1.25rem; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));">
                        <template x-for="field in getVisibleFields(activeHierarchyLevel)" :key="field">
                            <div class="form-group" :style="getFieldGroupStyle(activeHierarchyLevel, field)">
                                <template x-if="field === 'fteResources' || field === 'equipmentResources'">
                                    <div>
                                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.875rem;" x-text="getFieldLabel(field)"></label>
                                        <div style="display: flex; flex-wrap: wrap; gap: 0.375rem; margin-bottom: 0.5rem; min-height: 24px;">
                                            <template x-for="resource in getResourceValues(activeHierarchyLevel, field)" :key="resource">
                                                <span style="display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.25rem 0.5rem; background: var(--primary-color); color: white; border-radius: 0.25rem; font-size: 0.75rem;">
                                                    <span x-text="getResourceLabel(field, resource)"></span>
                                                    <button type="button" @click.prevent="removeResource(activeHierarchyLevel, field, resource)" style="background: none; border: none; color: white; cursor: pointer; padding: 0; font-size: 0.875rem;">×</button>
                                                </span>
                                            </template>
                                        </div>
                                        <div x-data="{ open: false }" @click.away="open = false" style="position: relative;">
                                            <button type="button" @click="open = !open" style="width: 100%; text-align: left; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 0.25rem; background: var(--bg-primary); cursor: pointer; font-size: 0.875rem;">
                                                Choose resources
                                            </button>
                                            <div x-show="open" style="position: absolute; left: 0; right: 0; margin-top: 0.25rem; background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 0.25rem; max-height: 220px; overflow-y: auto; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                                                <template x-for="option in getResourceOptions(field)" :key="option.id">
                                                    <button type="button"
                                                            @click="toggleResource(activeHierarchyLevel, field, option.id)"
                                                            style="width: 100%; text-align: left; padding: 0.5rem 0.75rem; border: none; background: transparent; cursor: pointer; font-size: 0.875rem;"
                                                            :style="isResourceSelected(activeHierarchyLevel, field, option.id) ? 'background: var(--primary-color-10);' : ''">
                                                        <span x-text="option.name"></span>
                                                    </button>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </template>

                                <template x-if="field === 'fteTimePercentage' || field === 'equipmentTimePercentage'">
                                    <div>
                                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                                            <label style="font-weight: 500; font-size: 0.875rem;" x-text="getFieldLabel(field)"></label>
                                            <span style="font-size: 0.875rem; font-weight: 600; color: var(--primary-color);" x-text="(getFieldValue(activeHierarchyLevel, field) || 0) + '%' "></span>
                                        </div>
                                        <input type="range"
                                               min="0"
                                               max="100"
                                               step="5"
                                               :value="getFieldValue(activeHierarchyLevel, field)"
                                               style="width: 100%; height: 0.5rem; padding: 0;"
                                               @input="setFieldValue(activeHierarchyLevel, field, Number($event.target.value))">
                                    </div>
                                </template>

                                <template x-if="field === 'isExternal'">
                                    <div>
                                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.875rem;">
                                            <input type="checkbox"
                                                   :checked="!!getFieldValue(activeHierarchyLevel, field)"
                                                   @change="setFieldValue(activeHierarchyLevel, field, $event.target.checked)">
                                            <span x-text="getFieldLabel(field)"></span>
                                        </label>
                                        <p style="margin: 0.25rem 0 0 1.5rem; font-size: 0.75rem; color: var(--text-light);" x-text="getFieldHelp(field)"></p>
                                    </div>
                                </template>

                                <template x-if="field === 'forceStartWeek'">
                                    <div>
                                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.875rem;" x-text="getFieldLabel(field)"></label>
                                        <input type="text"
                                               class="form-control"
                                               placeholder="YYYY-Www"
                                               :value="getFieldValue(activeHierarchyLevel, field)"
                                               @input="setFieldValue(activeHierarchyLevel, field, $event.target.value)">
                                        <p style="margin: 0.25rem 0 0 0; font-size: 0.75rem; color: var(--text-light);" x-text="getFieldHelp(field)"></p>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <template x-if="requiresSelection(activeHierarchyLevel) && !getSelectedId(activeHierarchyLevel)">
                <div style="text-align: center; padding: 3rem; color: var(--text-light); background: var(--bg-secondary); border-radius: 0.5rem;">
                    <p style="margin: 0;">Select an item to edit this hierarchy level.</p>
                </div>
            </template>
        </div>

    </div>
</div>

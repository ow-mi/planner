<div x-data="outputViewerComponent()">
    <!-- Output Data Section -->
    <div class="section">
        <div x-show="!hasResults">
            <p>No results available. Run the solver first.</p>
        </div>

        <template x-if="hasResults">
            <div>
                <!-- Summary Section -->
                <div class="section">
                    <h3>Summary</h3>
                    <p>Status: <span x-text="results?.status || 'Unknown'"></span></p>
                    <p x-show="results?.status === 'INFEASIBLE' || results?.status === 'NO_SOLUTION'" class="validation-error" style="padding: 0.5rem; margin: 0.5rem 0;">
                        Solver completed without a feasible schedule. No tests could be assigned under current constraints.
                    </p>
                    <template x-if="results && results.makespan !== null && results.makespan !== undefined">
                        <p>Makespan: <span x-text="results?.makespan"></span> days</p>
                    </template>
                    <template x-if="results?.solver_stats">
                        <div>
                            <p>Solve Time: <span x-text="results.solver_stats.solve_time?.toFixed(2) || 'N/A'"></span>s</p>
                            <p>Objective Value: <span x-text="results.solver_stats.objective_value || 'N/A'"></span></p>
                            <p>Scheduled Tests: <span x-text="Array.isArray(results?.test_schedule) ? results.test_schedule.length : 0"></span></p>
                        </div>
                    </template>
                </div>

                <!-- Output Files Section -->
                <div class="section">
                    <h3>Output Files</h3>
                    <p>Outputs are written directly by the backend to the selected base folder.</p>
                    <p x-show="results?.output_root"><strong>Output Root:</strong> <code x-text="results.output_root"></code></p>
                    <div style="overflow-x: auto;">
                        <table style="margin-top: 1rem;">
                            <thead>
                                <tr>
                                    <th>Filename</th>
                                    <th>Size</th>
                                    <th>Written Path</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="(content, filename) in results?.output_files" :key="filename">
                                    <tr>
                                        <td x-text="filename"></td>
                                        <td x-text="helpers.formatFileSize(content.length)"></td>
                                        <td><code x-text="writtenPath(filename)"></code></td>
                                    </tr>
                                </template>
                                <tr x-show="Object.keys(results?.output_files || {}).length === 0">
                                    <td colspan="3">No output files were generated for this run.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Results Preview Section -->
                <div class="section">
                    <h3>Results Preview</h3>
                    <div style="max-height: 400px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 4px; padding: 1rem; background-color: #f8f9fa;">
                        <pre style="margin: 0; font-size: 0.8rem; white-space: pre-wrap;" x-text="JSON.stringify(results, null, 2)"></pre>
                    </div>
                </div>
            </div>
        </template>
    </div>
</div>

<script>
function outputViewerComponent() {
    return {
        helpers: window.helpers,
        init() {
            console.log('Output viewer component initialized');
        },

        // Access store properties
        get results() {
            return this.$store.solver.getResults();
        },

        get hasResults() {
            return this.$store.solver.hasResults();
        },

        writtenPath(filename) {
            const explicitPath = this.results?.written_output_paths?.[filename];
            if (explicitPath) {
                return explicitPath;
            }
            const root = this.results?.output_root;
            if (!root) {
                return 'N/A';
            }
            return `${root}/data/${filename}`;
        },
    };
}
</script>
